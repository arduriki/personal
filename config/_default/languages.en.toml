bio = "I started my career understanding how signals travel — telecommunications, ISP infrastructure, routers, firewalls. Then I moved into software. But I never stopped wanting to understand what happens underneath. Today I build backend systems professionally in Python, and I'm learning C and network programming to close the gap between the application layer and the wire. I want to be the developer who can explain both."
